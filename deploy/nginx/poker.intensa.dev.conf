# Reverse proxy for Agent Poker. The table app listens on 127.0.0.1:7777 and
# multiplexes WebSocket (players + spectators), the HTTP API and the spectator UI
# on that single port, so one location block covers everything.
#
# Install:
#   sudo cp deploy/nginx/poker.intensa.dev.conf /etc/nginx/sites-available/poker.intensa.dev
#   sudo ln -s /etc/nginx/sites-available/poker.intensa.dev /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d poker.intensa.dev   # injects the TLS config + 80->443 redirect
#
# After certbot runs, the proxied X-Forwarded-Proto becomes "https", which is what
# the app reads to hand out wss:// invite links.

# Maps the WS Upgrade header so the same location serves plain HTTP and WebSocket.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name poker.intensa.dev;

    location / {
        proxy_pass http://127.0.0.1:7777;
        proxy_http_version 1.1;

        # WebSocket upgrade
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        # Forwarded headers — X-Forwarded-Proto is required: the app uses it to
        # decide between ws:// and wss:// in /api/seat-link.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Poker WS connections are long-lived and idle between hands; keep them open.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
